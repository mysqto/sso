services:
  browserless_chrome:
    image: browserless/chrome@sha256:57d19e414d9fe4ae9d2ab12ba768c97f38d51246c5b31af55a009205c136012f
    container_name: browserless_chrome
    restart: on-failure
    volumes:
      - ./.google-chrome:/data
    cap_add:
      - "NET_ADMIN"
    environment:
      - DEBUG=browserless:*
      - DEFAULT_USER_DATA_DIR=/data
      - CONNECTION_TIMEOUT=-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/json/version"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - default
      - sso

  browserless_chromium:
    image: ghcr.io/browserless/chromium
    container_name: browserless_chromium
    restart: on-failure
    volumes:
      - ./.google-chrome-v2:/data
    environment:
      - TOKEN=browserless
      - CONCURRENT=10
      - DATA_DIR=/data
      - CONNECTION_TIMEOUT=-1
      - TIMEOUT=300000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/json/version?token=browserless"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s

  sso:
    build:
      context: .
      target: application
    image: sso
    env_file:
      - .sso.env
    volumes:
      - ./.aws:/root/.aws
      - ./sso-config.json:/config/sso-config.json:ro

  sso_server:
    build:
      context: .
      target: application
    image: sso
    container_name: sso_server
    env_file:
      - .sso.env
    volumes:
      - ./.aws:/root/.aws
      - ./sso-config.json:/config/sso-config.json:ro
    ports:
      - "127.0.0.1:${SSO_SERVER_PORT:-8080}:8080"
    entrypoint: ["/usr/local/bin/get-credentials.sh", "--serve", "--port", "8080"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - default
      - sso

networks:
  sso:
    external: true
